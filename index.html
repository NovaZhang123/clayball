<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>解压手作球捏捏 · 积木泥声版</title>
  <style>
    :root {
      --bg1: #fff6e8;
      --bg2: #ffd6b3;
      --ink: #4a2b1f;
      --panel: rgba(255,255,255,.72);
      --panel2: rgba(255,255,255,.42);
      --accent: #ff8a3d;
      --accent2: #ff6348;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 25% 10%, #fff8d7 0, transparent 34%),
        radial-gradient(circle at 80% 0%, #ffe4f4 0, transparent 30%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
    }
    canvas {
      display: block;
      width: 100vw; height: 100vh;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }

    /* ── HUD ── */
    .hud {
      position: fixed;
      top: 14px; left: 14px;
      width: min(380px, calc(100vw - 28px));
      padding: 12px 14px 11px;
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 45px rgba(130, 75, 30, .16);
      border: 1px solid rgba(255,255,255,.65);
      user-select: none;
      z-index: 10;
    }
    .title {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      font-weight: 850; letter-spacing: .02em; margin-bottom: 6px;
    }
    .badge {
      font-size: 11px; color: #8a4d26;
      background: rgba(255, 138, 61, .16);
      padding: 3px 8px; border-radius: 999px; white-space: nowrap;
    }
    .help {
      font-size: 12px; line-height: 1.42; opacity: .78; margin-bottom: 8px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
    }
    label {
      display: grid; gap: 2px;
      font-size: 11px; font-weight: 700; color: rgba(74, 43, 31, .78);
    }
    input[type="range"] {
      width: 100%; accent-color: var(--accent);
    }
    .buttons {
      display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
    }
    button {
      flex: 1; min-width: 56px;
      border: 0; border-radius: 999px; padding: 7px 9px;
      font-weight: 800; font-size: 12px;
      color: #4d2a17;
      background: rgba(255, 255, 255, .72);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.8), 0 6px 16px rgba(117, 61, 22, .10);
      cursor: pointer;
      transition: background .18s, transform .1s;
    }
    button:active { transform: scale(.95); }
    button.active {
      background: #ffb36d;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.9), 0 4px 12px rgba(255,138,61,.28);
    }

    /* ── DIY Panel ── */
    .diy-toggle {
      position: fixed;
      top: 14px; right: 14px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 8px 20px rgba(130, 75, 30, .14);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 11;
      font-size: 20px;
      transition: transform .2s;
    }
    .diy-toggle.open { transform: rotate(45deg); background: #ffb36d; }

    .diy-panel {
      position: fixed;
      top: 62px; right: 14px;
      width: min(300px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 45px rgba(130, 75, 30, .18);
      border: 1px solid rgba(255,255,255,.65);
      z-index: 10;
      transform: translateY(-12px);
      opacity: 0;
      pointer-events: none;
      transition: transform .25s ease, opacity .25s ease;
    }
    .diy-panel.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .diy-section {
      margin-bottom: 10px;
    }
    .diy-section h4 {
      font-size: 12px; font-weight: 800; margin-bottom: 5px;
      color: rgba(74, 43, 31, .65);
      text-transform: uppercase; letter-spacing: .04em;
    }
    .color-row {
      display: flex; gap: 8px; align-items: center;
    }
    .color-row input[type="color"] {
      width: 32px; height: 32px; border: 2px solid rgba(255,255,255,.8);
      border-radius: 8px; cursor: pointer; padding: 0; background: none;
    }
    .color-preset {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .color-preset span {
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color .15s, transform .12s;
    }
    .color-preset span:hover { transform: scale(1.15); }
    .color-preset span.selected { border-color: var(--accent); transform: scale(1.12); }

    .topping-row {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .topping-btn {
      font-size: 11px; padding: 4px 9px; border-radius: 999px;
      border: 1.5px solid rgba(74,43,31,.14);
      background: rgba(255,255,255,.5);
      cursor: pointer; font-weight: 700; color: #4d2a17;
      transition: all .15s;
    }
    .topping-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    .save-row {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .save-row input {
      flex: 1; border: 1.5px solid rgba(74,43,31,.16);
      border-radius: 999px; padding: 5px 10px;
      font-size: 12px; background: rgba(255,255,255,.55);
    }
    .save-row button { flex: 0; min-width: 48px; }

    .preset-list {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
    }
    .preset-chip {
      font-size: 10px; padding: 3px 8px; border-radius: 999px;
      background: rgba(255,138,61,.12); color: #8a4d26;
      cursor: pointer; font-weight: 700;
      transition: background .15s;
      display: flex; align-items: center; gap: 4px;
    }
    .preset-chip:hover { background: rgba(255,138,61,.24); }
    .preset-chip .del { opacity: .4; cursor: pointer; font-size: 12px; }
    .preset-chip .del:hover { opacity: 1; color: #ff4d66; }

    /* ── Sound Feedback Pulse ── */
    .pulse-ring {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      border: 2px solid rgba(255,138,61,.5);
      opacity: 0;
      z-index: 5;
      animation: pulseOut .45s ease-out forwards;
    }
    @keyframes pulseOut {
      0% { opacity: .6; transform: scale(.4); }
      100% { opacity: 0; transform: scale(1.8); }
    }

    /* ── Stress Meter ── */
    .meter {
      position: fixed;
      left: 50%; bottom: 18px;
      transform: translateX(-50%);
      width: min(340px, calc(100vw - 36px));
      height: 10px; border-radius: 999px; overflow: hidden;
      background: rgba(255,255,255,.55);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 8px 24px rgba(121,64,24,.12);
      z-index: 5;
    }
    .meter>div {
      height: 100%; width: 0%; border-radius: inherit;
      background: linear-gradient(90deg, #ffd383, #ff8a3d, #ff4d66);
      transition: width .07s linear;
    }

    .gesture-hint {
      position: fixed;
      left: 50%; bottom: 40px;
      transform: translateX(-50%);
      font-size: 12px; font-weight: 700;
      color: rgba(74,43,31,.52);
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      z-index: 5;
    }
    .gesture-hint.show { opacity: 1; }

    .sound-start {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 12px 32px rgba(130, 75, 30, .16);
      backdrop-filter: blur(14px);
      color: #6b3a20;
      font-size: 14px;
      font-weight: 850;
      pointer-events: auto;
      user-select: none;
      transition: opacity .25s, transform .25s;
    }
    .sound-start.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.92);
    }

    @media (max-width: 640px) {
      .hud { top: 8px; left: 8px; padding: 10px; width: calc(100vw - 80px); }
      .controls { grid-template-columns: 1fr; max-height: 155px; overflow: auto; padding-right: 2px; }
      .diy-panel { top: 54px; right: 8px; width: min(270px, calc(100vw - 20px)); }
      .diy-toggle { top: 8px; right: 8px; width: 36px; height: 36px; font-size: 18px; }
      .help { font-size: 11px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- HUD -->
  <div class="hud">
    <div class="title">
      <span>解压手作球</span>
      <span class="badge" id="materialName">胶粘米粒底胶</span>
    </div>
    <div class="help">按住球拖、推、扯。声随力变：越用力越爽脆炸耳，压越久越沉。</div>
    <div class="controls">
      <label>柔软度 <input id="softness" type="range" min="0" max="1" step="0.01" value="0.66"></label>
      <label>黏性 <input id="stickiness" type="range" min="0" max="1" step="0.01" value="0.78"></label>
      <label>可塑性 <input id="plasticity" type="range" min="0" max="1" step="0.01" value="0.52"></label>
      <label>延展性 <input id="stretch" type="range" min="0" max="1" step="0.01" value="0.82"></label>
      <label>压坑记忆 <input id="dentMemory" type="range" min="0" max="1" step="0.01" value="0.72"></label>
      <label>回弹 <input id="elasticity" type="range" min="0" max="1" step="0.01" value="0.28"></label>
      <label>粒感 <input id="grain" type="range" min="0" max="1" step="0.01" value="0.72"></label>
      <label>湿润 <input id="wetness" type="range" min="0" max="1" step="0.01" value="0.63"></label>
    </div>
    <div class="buttons">
      <button id="rice" class="active">米粒底胶</button>
      <button id="ice">碎冰胶</button>
      <button id="jelly">果冻胶</button>
      <button id="reset">重置形状</button>
    </div>
  </div>

  <!-- DIY Toggle -->
  <div class="diy-toggle" id="diyToggle" title="DIY 自定义">🎨</div>

  <!-- DIY Panel -->
  <div class="diy-panel" id="diyPanel">
    <div class="diy-section">
      <h4>🎨 底色</h4>
      <div class="color-row">
        <input type="color" id="baseColor" value="#ffe284">
        <div class="color-preset" id="colorPresets">
          <span style="background:#ffe284" data-color="#ffe284" class="selected"></span>
          <span style="background:#ffb3ba" data-color="#ffb3ba"></span>
          <span style="background:#bae1ff" data-color="#bae1ff"></span>
          <span style="background:#baffc9" data-color="#baffc9"></span>
          <span style="background:#e8d1ff" data-color="#e8d1ff"></span>
          <span style="background:#fff" data-color="#ffffff"></span>
          <span style="background:#d4a574" data-color="#d4a574"></span>
          <span style="background:#a0d2db" data-color="#a0d2db"></span>
        </div>
      </div>
    </div>
    <div class="diy-section">
      <h4>🌈 点缀色</h4>
      <div class="color-row">
        <input type="color" id="accentColor" value="#ff903e">
        <div class="color-preset" id="accentPresets">
          <span style="background:#ff903e" data-color="#ff903e" class="selected"></span>
          <span style="background:#ff6b6b" data-color="#ff6b6b"></span>
          <span style="background:#4ecdc4" data-color="#4ecdc4"></span>
          <span style="background:#ffe66d" data-color="#ffe66d"></span>
          <span style="background:#a29bfe" data-color="#a29bfe"></span>
          <span style="background:#fd79a8" data-color="#fd79a8"></span>
          <span style="background:#00cec9" data-color="#00cec9"></span>
          <span style="background:#fff" data-color="#ffffff"></span>
        </div>
      </div>
    </div>
    <div class="diy-section">
      <h4>⭐ 点缀颗粒形状</h4>
      <div class="topping-row" id="toppingButtons">
        <span class="topping-btn active" data-type="rice">米粒</span>
        <span class="topping-btn" data-type="star">星星</span>
        <span class="topping-btn" data-type="shard">碎片</span>
        <span class="topping-btn" data-type="dot">圆珠</span>
        <span class="topping-btn" data-type="mix">混合</span>
      </div>
      <label style="margin-top:6px">密度 <input id="toppingDensity" type="range" min="0.2" max="2" step="0.05" value="1"></label>
    </div>
    <div class="diy-section">
      <h4>🔊 声音音色</h4>
      <label>清脆度 <input id="soundCrisp" type="range" min="0" max="1" step="0.01" value="0.72"></label>
      <label>包裹感 <input id="soundMuffle" type="range" min="0" max="1" step="0.01" value="0.42"></label>
      <label>炸裂度 <input id="soundBurst" type="range" min="0" max="1.8" step="0.01" value="1.18"></label>
      <label>摩擦量 <input id="soundFriction" type="range" min="0" max="1.4" step="0.01" value="0.72"></label>
    </div>
    <div class="diy-section">
      <h4>💾 保存预设</h4>
      <div class="save-row">
        <input id="presetName" placeholder="给我的手作球取个名字..." maxlength="12">
        <button id="savePreset">保存</button>
      </div>
      <div class="preset-list" id="presetList"></div>
    </div>
  </div>

  <!-- Stress Meter -->
  <div class="meter"><div id="stressMeter"></div></div>
  <div class="gesture-hint" id="gestureHint"></div>
  <div class="sound-start" id="soundStart">🔊 点一下开启声音</div>

  <script>
    // ═══════════════════════════════════════
    //  CANVAS & PHYSICS (mostly unchanged core)
    // ═══════════════════════════════════════
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const stressMeter = document.getElementById('stressMeter');
    const materialName = document.getElementById('materialName');
    const gestureHint = document.getElementById('gestureHint');
    const soundStart = document.getElementById('soundStart');

    const sliders = {
      softness: document.getElementById('softness'),
      stickiness: document.getElementById('stickiness'),
      plasticity: document.getElementById('plasticity'),
      stretch: document.getElementById('stretch'),
      dentMemory: document.getElementById('dentMemory'),
      elasticity: document.getElementById('elasticity'),
      grain: document.getElementById('grain'),
      wetness: document.getElementById('wetness')
    };

    const materialPresets = {
      rice:  { name:'胶粘米粒底胶', softness:.68, stickiness:.88, plasticity:.84, stretch:.86, dentMemory:.78, elasticity:.06, grain:.82, wetness:.58, hue:43,  baseColor:'#ffe284', accentColor:'#ff903e' },
      ice:   { name:'碎冰球',       softness:.56, stickiness:.34, plasticity:.66, stretch:.72, dentMemory:.64, elasticity:.08, grain:.94, wetness:.28, hue:184, baseColor:'#d4f4ff', accentColor:'#b0e8f8' },
      jelly: { name:'果冻球',       softness:.80, stickiness:.42, plasticity:.34, stretch:.66, dentMemory:.38, elasticity:.42, grain:.30, wetness:.82, hue:104, baseColor:'#d4ffd4', accentColor:'#ffb6d8' }
    };

    const soundProfiles = {
      rice:  { bodyFreq:340, bodyGain:.07, bodyPeak:.75, amb:0, tapGain:1.22, tapPitch:.98, frictionGain:1.55, snapGain:1.10, snapChance:.42, squishGain:.44, lowCut:330, squishLP:980 },
      ice:   { bodyFreq:520, bodyGain:.055, bodyPeak:.62, amb:0, tapGain:1.42, tapPitch:1.28, frictionGain:1.58, snapGain:1.65, snapChance:.70, squishGain:.28, lowCut:430, squishLP:1450 },
      jelly: { bodyFreq:300, bodyGain:.055, bodyPeak:.58, amb:0, tapGain:.96, tapPitch:.84, frictionGain:.98, snapGain:.82, snapChance:.26, squishGain:.38, lowCut:300, squishLP:820 }
    };
    function soundProfile() { return soundProfiles[currentMaterial] || soundProfiles.rice; }

    let currentMaterial = 'rice';
    let DPR = 1, W = 0, H = 0;
    let nodes = [], edges = [], boundary = [], toppings = [];
    let center = { x:0, y:0 };
    let targetArea = 1;
    let currentStress = 0;
    let popFlash = 0;
    let customBaseColor = null;
    let customAccentColor = null;
    let toppingStyle = 'rice';

    const input = {
      down: false, x:0, y:0, px:0, py:0, dx:0, dy:0,
      speed: 0, pressure: 1, pointerId: null,
      // gesture tracking
      pressStartTime: 0, pressDuration: 0
    };

    let audio = null;
    let audioUnlocked = false;
    const soundUI = {
      crisp: document.getElementById('soundCrisp'),
      muffle: document.getElementById('soundMuffle'),
      burst: document.getElementById('soundBurst'),
      friction: document.getElementById('soundFriction')
    };
    function soundVal(key, fallback=0.5) {
      const v = parseFloat(soundUI[key]?.value);
      return Number.isFinite(v) ? v : fallback;
    }
    let lastEventTime = {};
    let lastStressForEvent = 0;
    let soundCooldowns = {};
    let wasTouching = false;
    let idleTimer = 0;

    function val(name) { return parseFloat(sliders[name].value); }
    function rand(a,b) { return a+Math.random()*(b-a); }
    function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }
    function smoothstep(e0,e1,x) { const t=clamp((x-e0)/(e1-e0),0,1); return t*t*(3-2*t); }
    function average(arr,key) { if(!arr.length) return 0; let s=0; for(const n of arr) s+=n[key]; return s/arr.length; }

    // ── DIY Panel Logic ──
    (function(){
      const toggle = document.getElementById('diyToggle');
      const panel = document.getElementById('diyPanel');
      const baseColor = document.getElementById('baseColor');
      const accentColor = document.getElementById('accentColor');
      const toppingDensity = document.getElementById('toppingDensity');
      const saveBtn = document.getElementById('savePreset');
      const presetName = document.getElementById('presetName');

      toggle.onclick = () => {
        const open = panel.classList.toggle('open');
        toggle.classList.toggle('open', open);
      };

      // Color preset clicks
      document.getElementById('colorPresets').onclick = (e) => {
        if (e.target.tagName === 'SPAN') {
          const c = e.target.dataset.color;
          baseColor.value = c;
          customBaseColor = c;
          document.querySelectorAll('#colorPresets span').forEach(s=>s.classList.remove('selected'));
          e.target.classList.add('selected');
          applyCustomColors();
        }
      };
      document.getElementById('accentPresets').onclick = (e) => {
        if (e.target.tagName === 'SPAN') {
          const c = e.target.dataset.color;
          accentColor.value = c;
          customAccentColor = c;
          document.querySelectorAll('#accentPresets span').forEach(s=>s.classList.remove('selected'));
          e.target.classList.add('selected');
          applyCustomColors();
        }
      };
      baseColor.oninput = () => { customBaseColor = baseColor.value; applyCustomColors(); };
      accentColor.oninput = () => { customAccentColor = accentColor.value; applyCustomColors(); };

      // Topping style
      document.getElementById('toppingButtons').onclick = (e) => {
        if (e.target.classList.contains('topping-btn')) {
          document.querySelectorAll('.topping-btn').forEach(b=>b.classList.remove('active'));
          e.target.classList.add('active');
          toppingStyle = e.target.dataset.type;
          initToppings();
        }
      };

      // Density
      toppingDensity.oninput = () => { initToppings(); };

      // Save preset
      saveBtn.onclick = () => {
        const name = presetName.value.trim();
        if (!name) return;
        const preset = {
          name,
          softness: val('softness'), stickiness: val('stickiness'),
          plasticity: val('plasticity'), stretch: val('stretch'), dentMemory: val('dentMemory'), elasticity: val('elasticity'),
          grain: val('grain'), wetness: val('wetness'),
          baseColor: customBaseColor || materialPresets[currentMaterial].baseColor,
          accentColor: customAccentColor || materialPresets[currentMaterial].accentColor,
          toppingStyle, toppingDensity: parseFloat(toppingDensity.value)
        };
        const presets = JSON.parse(localStorage.getItem('squishyPresets') || '[]');
        presets.push(preset);
        localStorage.setItem('squishyPresets', JSON.stringify(presets));
        presetName.value = '';
        renderPresets();
      };

      function applyCustomColors() {
        // Colors are applied in drawBlob via getBaseColor() / getAccentColor()
      }
      window.applyCustomColors = applyCustomColors;

      window.getBaseColor = () => customBaseColor || materialPresets[currentMaterial].baseColor;
      window.getAccentColor = () => customAccentColor || materialPresets[currentMaterial].accentColor;

      window.loadPreset = (preset) => {
        for (const k of ['softness','stickiness','plasticity','stretch','dentMemory','elasticity','grain','wetness']) {
          if (preset[k] !== undefined) sliders[k].value = preset[k];
        }
        customBaseColor = preset.baseColor;
        customAccentColor = preset.accentColor;
        baseColor.value = preset.baseColor;
        accentColor.value = preset.accentColor;
        toppingStyle = preset.toppingStyle;
        toppingDensity.value = preset.toppingDensity;
        // Update UI
        document.querySelectorAll('#colorPresets span').forEach(s=>s.classList.remove('selected'));
        document.querySelectorAll('#accentPresets span').forEach(s=>s.classList.remove('selected'));
        document.querySelectorAll('.topping-btn').forEach(b=>b.classList.remove('active'));
        const tb = document.querySelector(`.topping-btn[data-type="${preset.toppingStyle}"]`);
        if (tb) tb.classList.add('active');
        initBlob();
      };

      function renderPresets() {
        const list = document.getElementById('presetList');
        const presets = JSON.parse(localStorage.getItem('squishyPresets') || '[]');
        list.innerHTML = presets.map((p,i) =>
          `<span class="preset-chip" data-idx="${i}">
            <span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.baseColor};margin-right:2px"></span>
            ${p.name}
            <span class="del" data-del="${i}">×</span>
          </span>`
        ).join('');
      }
      window.renderPresets = renderPresets;

      document.getElementById('presetList').onclick = (e) => {
        if (e.target.classList.contains('del')) {
          const idx = parseInt(e.target.dataset.del);
          const presets = JSON.parse(localStorage.getItem('squishyPresets') || '[]');
          presets.splice(idx, 1);
          localStorage.setItem('squishyPresets', JSON.stringify(presets));
          renderPresets();
          return;
        }
        const chip = e.target.closest('.preset-chip');
        if (chip) {
          const idx = parseInt(chip.dataset.idx);
          const presets = JSON.parse(localStorage.getItem('squishyPresets') || '[]');
          if (presets[idx]) loadPreset(presets[idx]);
        }
      };

      renderPresets();
    })();

    // ── Apply Material Preset ──
    function applyPreset(key) {
      currentMaterial = key;
      customBaseColor = null;
      customAccentColor = null;
      const p = materialPresets[key];
      for (const k of Object.keys(sliders)) sliders[k].value = p[k];
      materialName.textContent = p.name;
      document.getElementById('baseColor').value = p.baseColor;
      document.getElementById('accentColor').value = p.accentColor;
      document.querySelectorAll('.buttons button').forEach(b => b.classList.remove('active')); 
      document.getElementById(key)?.classList.add('active');
      document.querySelectorAll('#colorPresets span').forEach(s=>s.classList.remove('selected'));
      document.querySelectorAll('#accentPresets span').forEach(s=>s.classList.remove('selected'));
      initBlob();
    }

    document.getElementById('rice').onclick  = () => applyPreset('rice');
    document.getElementById('ice').onclick   = () => applyPreset('ice');
    document.getElementById('jelly').onclick = () => applyPreset('jelly');
    document.getElementById('reset').onclick = () => resetShape();

    function resetShape() {
      if (!nodes.length) return;
      for (const n of nodes) {
        n.x = n.px = n.rx = n.homeX;
        n.y = n.py = n.ry = n.homeY;
        n.stress = 0;
        n.slip = 0;
        n.depth = 0;
      }
      for (const e of edges) {
        e.rest = e.baseRest || e.rest;
      }
      currentStress = 0;
      popFlash = 0;
      updateToppings();
    }

    // ── Resize ──
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = Math.floor(window.innerWidth);
      H = Math.floor(window.innerHeight);
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR,0,0,DPR,0,0);
      initBlob();
    }
    window.addEventListener('resize', resize);

    // ── Blob Init ──
    function initBlob() {
      nodes = []; edges = []; boundary = []; toppings = [];
      center = { x: W*.53, y: H*.55 };
      const radius = Math.min(W,H)*(W<680?.245:.255);
      const spacing = Math.max(20, Math.min(30, radius/5.2));
      const map = new Map();
      const rCells = Math.ceil(radius/spacing);

      for (let gy=-rCells; gy<=rCells; gy++) {
        for (let gx=-rCells; gx<=rCells; gx++) {
          const ox=gx*spacing, oy=gy*spacing;
          const d=Math.hypot(ox,oy);
          if (d<=radius) {
            const ef = d/radius;
            const n = {
              gx,gy, x:center.x+ox, y:center.y+oy,
              px:center.x+ox, py:center.y+oy,
              rx:center.x+ox, ry:center.y+oy,
              homeX:center.x+ox, homeY:center.y+oy,
              restRadius:d,
              edgeFactor:ef, boundary:ef>.78,
              slip:0, stress:0, depth:0,
              localHue: materialPresets[currentMaterial].hue + (Math.random()*18-9)
            };
            map.set(gx+','+gy, nodes.length);
            nodes.push(n);
          }
        }
      }
      function addEdge(a,b,strength=1) {
        const ia=map.get(a[0]+','+a[1]), ib=map.get(b[0]+','+b[1]);
        if (ia===undefined||ib===undefined) return;
        const A=nodes[ia], B=nodes[ib];
        const rest = Math.hypot(A.x-B.x, A.y-B.y);
        edges.push({a:ia, b:ib, rest, baseRest:rest, strength});
      }
      for (const n of nodes) {
        addEdge([n.gx,n.gy],[n.gx+1,n.gy],1);
        addEdge([n.gx,n.gy],[n.gx,n.gy+1],1);
        addEdge([n.gx,n.gy],[n.gx+1,n.gy+1],.72);
        addEdge([n.gx,n.gy],[n.gx-1,n.gy+1],.72);
      }
      boundary = nodes.filter(n=>n.boundary);
      targetArea = polygonArea(boundarySorted());
      initToppings();
    }

    function initToppings() {
      toppings = [];
      const density = parseFloat(document.getElementById('toppingDensity')?.value || 1);
      const counts = { rice:72, star:60, shard:80, dot:90, mix:75 };
      const baseCount = counts[toppingStyle] || 72;
      const toppingCount = Math.floor(baseCount * density);
      const spacing = Math.max(20, Math.min(30, Math.min(W,H)*.255/5.2));

      for (let i=0; i<toppingCount; i++) {
        const candidates = nodes.filter(n=>n.edgeFactor>.18&&n.edgeFactor<.84);
        const anchor = candidates[Math.floor(Math.random()*candidates.length)];
        const angle = Math.random()*Math.PI*2;
        const dist = Math.random()*spacing*.24;
        let kind = Math.random();
        if (toppingStyle==='mix') {
          const types = ['rice','star','shard','dot'];
          kind = types[Math.floor(Math.random()*types.length)];
        }
        toppings.push({
          anchor, ox:Math.cos(angle)*dist, oy:Math.sin(angle)*dist,
          x:anchor.x+Math.cos(angle)*dist, y:anchor.y+Math.sin(angle)*dist,
          r: toppingStyle==='shard'?rand(2.0,5.8):rand(2.4,5.4),
          rot:Math.random()*Math.PI, spin:rand(-.035,.035), lag:rand(.10,.28),
          depthLayer: Math.random(),
          alpha: rand(.34,.90),
          scale: rand(.78,1.24),
          kind
        });
      }
    }

    function boundarySorted() {
      const cx=average(nodes,'x'), cy=average(nodes,'y');
      const sorted=[...boundary].sort((a,b)=>Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx));
      if(!sorted.length) return sorted;
      const raw=sorted.map(n=>({n,a:Math.atan2(n.y-cy,n.x-cx),r:Math.hypot(n.x-cx,n.y-cy)}));
      const avgR=raw.reduce((s,p)=>s+p.r,0)/raw.length;
      return raw.map((p,i)=>{
        const prev=raw[(i-1+raw.length)%raw.length], next=raw[(i+1)%raw.length];
        const smoothR=(prev.r+p.r*3+next.r)*.2;
        return {...p.n, x:cx+Math.cos(p.a)*(avgR*.58+smoothR*.42), y:cy+Math.sin(p.a)*(avgR*.58+smoothR*.42)};
      });
    }
    function polygonArea(pts) { let a=0; for(let i=0;i<pts.length;i++){const p=pts[i],q=pts[(i+1)%pts.length]; a+=p.x*q.y-q.x*p.y;} return Math.abs(a)*.5; }

    // ═══════════════════════════════════════
    //  NEW AUDIO ENGINE — 积木泥声系统
    // ═══════════════════════════════════════
    function ensureAudio() {
      if (audio) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ac = new AudioContext();

      const master = ac.createGain();
      master.gain.value = 1.04;
      master.connect(ac.destination);

      // Ambient source is kept available, but gain stays at zero by default.
      const ambGain = ac.createGain();
      ambGain.gain.value = 0;
      const ambFilter = ac.createBiquadFilter();
      ambFilter.type = 'lowpass';
      ambFilter.frequency.value = 180;
      ambFilter.Q.value = .4;
      const ambBuf = ac.createBuffer(1, ac.sampleRate*3, ac.sampleRate);
      const ambData = ambBuf.getChannelData(0);
      let ambLast = 0;
      for (let i=0; i<ambData.length; i++) {
        ambLast = ambLast*.992 + (Math.random()*2-1)*.008;
        ambData[i] = ambLast * .32;
      }
      const ambSrc = ac.createBufferSource();
      ambSrc.buffer = ambBuf; ambSrc.loop = true;
      ambSrc.connect(ambFilter); ambFilter.connect(ambGain); ambGain.connect(master);
      ambSrc.start();

      const bodyRes = ac.createBiquadFilter();
      bodyRes.type = 'peaking';
      bodyRes.frequency.value = 220;
      bodyRes.Q.value = .55;
      bodyRes.gain.value = 1.8;
      const bodyGain = ac.createGain();
      bodyGain.gain.value = .18;
      bodyRes.connect(bodyGain);
      bodyGain.connect(master);

      audio = {
        ac, master, ambGain, ambFilter, bodyRes, bodyGain,
        lastTick: 0, lastFriction: 0, lastPop: 0, lastSquish: 0, lastSnap: 0, lastLayered: 0,
        idleSince: 0
      };
    }

    function unlockAudio() {
      ensureAudio();
      if (!audio) return;
      const ac = audio.ac;
      const doUnlock = () => {
        try {
          // iOS/Safari often needs a real scheduled sound inside the first user gesture.
          const t = ac.currentTime;
          const osc = ac.createOscillator();
          const g = ac.createGain();
          osc.type = 'sine';
          osc.frequency.value = 440;
          g.gain.setValueAtTime(0.0001, t);
          g.gain.exponentialRampToValueAtTime(0.00001, t + .03);
          osc.connect(g); g.connect(audio.master);
          osc.start(t); osc.stop(t + .035);
        } catch (err) {}
        audioUnlocked = true;
        soundStart?.classList.add('hidden');
      };
      if (ac.state === 'suspended') {
        const p = ac.resume();
        if (p && typeof p.then === 'function') p.then(doUnlock).catch(() => {});
        else doUnlock();
      } else {
        doUnlock();
      }
    }

    // Mobile audio unlock: pointer events are not enough on every phone/browser.
    window.addEventListener('touchstart', unlockAudio, { passive: true });
    window.addEventListener('pointerdown', unlockAudio, { passive: true });
    window.addEventListener('click', unlockAudio, { passive: true });
    soundStart?.addEventListener('touchstart', unlockAudio, { passive: true });
    soundStart?.addEventListener('click', unlockAudio);

    // ── Core Sound: 积木摩擦单次点击 ──
    // Crisp wooden block tap, muffled inside clay
    function blockTap(intensity=0.5, pan=0) {
      if (!audio) return;
      const prof = soundProfile();
      intensity *= prof.tapGain;
      const ac = audio.ac;
      const now = ac.currentTime;
      if (now - (audio.lastTick||0) < .008) return;
      audio.lastTick = now;

      const dur = rand(.025, .065);
      const len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);

      for (let i=0; i<len; i++) {
        const t = i/len;
        const env = Math.exp(-t * 8) * 0.75 + Math.exp(-t * 35) * 0.25;
        const noise = (Math.random()*2-1) * Math.exp(-t*35) * .55;
        const freq = (2400 * prof.tapPitch) * Math.exp(-t*30) + 350 * prof.tapPitch;
        const phase = freq * t * Math.PI * 2;
        const tone = Math.sin(phase) * 0.6 + Math.sin(phase*2.3) * 0.35 + Math.sin(phase*4.7) * 0.18;
        d[i] = (tone*env*1.8 + noise*.7) * intensity;
      }

      const src = ac.createBufferSource();
      src.buffer = buf;

      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = rand(500, 1400);
      bp.Q.value = rand(.35, .9);

      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = rand(900, 3200) * prof.tapPitch * clamp(intensity+.5, .7, 1.4);
      lp.Q.value = .45;

      const g = ac.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(.09 + intensity*.46, now+.003);
      g.gain.exponentialRampToValueAtTime(.0001, now+dur+.02);

      // Stereo panning
      if (pan !== 0) {
        const panner = ac.createStereoPanner();
        panner.pan.value = pan;
        src.connect(bp); bp.connect(lp); lp.connect(panner); panner.connect(g);
      } else {
        src.connect(bp); bp.connect(lp); lp.connect(g);
      }
      g.connect(audio.master);
      src.start(now); src.stop(now+dur+.02);

      // Also route through body resonance for the "闷" body
      const g2 = ac.createGain();
      g2.gain.setValueAtTime(0, now);
      g2.gain.linearRampToValueAtTime((.012 + intensity*.045) * prof.bodyGain * 3.0, now+.005);
      g2.gain.exponentialRampToValueAtTime(.0001, now+dur+.05);
      lp.connect(g2);
      g2.connect(audio.bodyRes);
    }

    // ── 积木连续摩擦 ──
    function blockFriction(intensity=0.6, speed=1) {
      if (!audio) return;
      const prof = soundProfile();
      intensity *= prof.frictionGain;
      const ac = audio.ac;
      const now = ac.currentTime;
      if (now - (audio.lastFriction||0) < .014) return;
      audio.lastFriction = now;

      // Dry chew-rub: short granular clicks, not continuous noise.
      const frictionAmt = soundVal('friction', .46);
      if (frictionAmt < .04) return;
      const count = Math.floor(clamp(speed*7.2*frictionAmt, 2, 9));
      const spread = .011 / Math.max(.28, speed);
      const crisp = soundVal('crisp', .72);
      const muffle = soundVal('muffle', .42);

      for (let i=0; i<count; i++) {
        const start = now + i*spread*rand(.65, 1.45);
        const dur = rand(.005, .018);
        const len = Math.floor(ac.sampleRate * dur);
        const buf = ac.createBuffer(1, len, ac.sampleRate);
        const d = buf.getChannelData(0);
        const baseFreq = rand(900, 2400) * prof.tapPitch * (.82 + crisp*.55);

        for (let j=0; j<len; j++) {
          const t = j/len;
          const env = Math.exp(-t*28);
          // Sparse impulses + bright chirp. This avoids the “gurgle/water” texture.
          const impulse = (Math.random() < .28 ? (Math.random()*2-1) : 0) * Math.exp(-t*52);
          const scrape = Math.sin((baseFreq*Math.exp(-t*18)+360)*t*Math.PI*2) * .58;
          const dryNoise = (Math.random()*2-1) * .10 * Math.exp(-t*38);
          d[j] = (scrape*1.18 + impulse*1.25 + dryNoise) * env * intensity;
        }

        const src = ac.createBufferSource();
        src.buffer = buf;
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 520 + crisp * 520;
        hp.Q.value = .35;
        const bp = ac.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = rand(1000, 2600) * prof.tapPitch;
        bp.Q.value = rand(.55, 1.35);
        const lp = ac.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = rand(2200, 5200) * (1.05 - muffle*.18);
        lp.Q.value = .22;
        const g = ac.createGain();
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime((.052+intensity*.34) * frictionAmt, start+.001);
        g.gain.exponentialRampToValueAtTime(.0001, start+dur+.006);
        src.connect(hp); hp.connect(bp); bp.connect(lp); lp.connect(g); g.connect(audio.master);
        src.start(start); src.stop(start+dur+.012);
      }
    }

    // ── 深压 Squish ──
    function claySquish(intensity=0.5) {
      if (!audio) return;
      const prof = soundProfile();
      intensity *= prof.squishGain;
      const ac = audio.ac;
      const now = ac.currentTime;
      if (now - (audio.lastSquish||0) < .14) return;
      audio.lastSquish = now;

      // Dry compression: “chewy pressure crack”, not wet sub-bass.
      const dur = rand(.030, .070);
      const len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      const base = rand(420, 920) * prof.tapPitch;
      for (let i=0; i<len; i++) {
        const t = i/len;
        const env = Math.sin(Math.PI*t) * Math.exp(-t*5.8);
        const dry = (Math.random()*2-1) * (Math.random() < .34 ? 1 : .18);
        const chewTone = Math.sin((base + 360*Math.exp(-t*8))*t*Math.PI*2) * .22;
        d[i] = (dry*.88 + chewTone*.55) * env * intensity;
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      const hp = ac.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = prof.lowCut;
      hp.Q.value = .42;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = prof.squishLP;
      bp.Q.value = .75;
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = prof.squishLP * 2.2;
      lp.Q.value = .25;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(.052+intensity*.26*val('wetness'), now+.004);
      g.gain.exponentialRampToValueAtTime(.0001, now+dur+.018);
      src.connect(hp); hp.connect(bp); bp.connect(lp); lp.connect(g); g.connect(audio.master);
      src.start(now); src.stop(now+dur+.025);
    }

    // ── 清脆积木 Snap（快速折断感） ──
    function blockSnap(intensity=0.7) {
      if (!audio) return;
      const prof = soundProfile();
      intensity *= prof.snapGain;
      const ac = audio.ac;
      const now = ac.currentTime;
      if (now - (audio.lastSnap||0) < .06) return;
      audio.lastSnap = now;

      const dur = rand(.012, .028);
      const len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      const baseFreq = rand(2800, 4800) * prof.tapPitch;

      for (let i=0; i<len; i++) {
        const t = i/len;
        const env = Math.exp(-t*25);
        const freq = baseFreq * Math.exp(-t*40) + 500;
        const tone = Math.sin(freq*t*Math.PI*2)*.7 + Math.sin(freq*2.4*t*Math.PI*2)*.4 + Math.sin(freq*5.3*t*Math.PI*2)*.15;
        const noise = (Math.random()*2-1) * Math.exp(-t*50) * .3;
        d[i] = (tone + noise) * env * intensity * 1.2;
      }

      const src = ac.createBufferSource();
      src.buffer = buf;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = rand(1800, 4000);
      bp.Q.value = .6;
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = rand(1200, 3000);
      lp.Q.value = .35;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(.07+intensity*.32, now+.001);
      g.gain.exponentialRampToValueAtTime(.0001, now+dur+.015);
      src.connect(bp); bp.connect(lp); lp.connect(g); g.connect(audio.master);
      src.start(now); src.stop(now+dur+.02);
    }

    // ── 多层爆破包：不是单个 snap，而是一串被胶包住/露出来的细碎触发。
    function microBurstTick(intensity=.55, delay=0, bright=1, pan=0) {
      if (!audio) return;
      const ac = audio.ac;
      const prof = soundProfile();
      const start = ac.currentTime + delay;
      intensity *= prof.tapGain;

      const dur = rand(.008, .026);
      const len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      const base = rand(1800, 5200) * prof.tapPitch * bright;
      for (let i=0; i<len; i++) {
        const t = i / len;
        const env = Math.exp(-t * rand(22, 42));
        const noise = (Math.random()*2-1) * Math.exp(-t*50) * .46;
        const chirp = base * Math.exp(-t * 34) + 420 * prof.tapPitch;
        const tone = Math.sin(chirp*t*Math.PI*2)*.58 + Math.sin(chirp*2.37*t*Math.PI*2)*.28;
        d[i] = (tone + noise) * env * intensity;
      }

      const src = ac.createBufferSource();
      src.buffer = buf;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = rand(850, 3200) * prof.tapPitch * bright;
      bp.Q.value = rand(.35, 1.1);
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = rand(1200, 5200) * bright;
      lp.Q.value = .35;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(.034 + intensity*.22, start+.002);
      g.gain.exponentialRampToValueAtTime(.0001, start+dur+.018);

      if (Math.abs(pan) > .01 && ac.createStereoPanner) {
        const panner = ac.createStereoPanner();
        panner.pan.value = clamp(pan, -1, 1);
        src.connect(bp); bp.connect(lp); lp.connect(panner); panner.connect(g);
      } else {
        src.connect(bp); bp.connect(lp); lp.connect(g);
      }
      g.connect(audio.master);
      src.start(start); src.stop(start+dur+.025);
    }

    function muffledClayKnock(intensity=.55, delay=.014, muffled=true) {
      if (!audio) return;
      const ac = audio.ac;
      const prof = soundProfile();
      const start = ac.currentTime + delay;
      const dur = rand(.016, .048);
      const len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      const base = rand(520, 1200) * prof.tapPitch;
      for (let i=0; i<len; i++) {
        const t = i / len;
        const env = Math.exp(-t*14) * Math.sin(Math.PI * Math.min(1, t*1.5));
        const pulse = (Math.random() < .20 ? (Math.random()*2-1) : 0) * Math.exp(-t*42);
        const woody = Math.sin((base + 700*Math.exp(-t*15))*t*Math.PI*2) * .36;
        const dryGrain = (Math.random()*2-1) * .08 * Math.exp(-t*32);
        d[i] = (pulse*.82 + woody + dryGrain) * env * intensity;
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      const hp = ac.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = prof.lowCut + (muffled ? 40 : 120);
      hp.Q.value = .35;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = muffled ? rand(720, 1500) : rand(1350, 3100);
      bp.Q.value = muffled ? .82 : .58;
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = muffled ? rand(1500, 2600) : rand(2600, 5600);
      lp.Q.value = .22;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime((.034 + intensity*.18) * (muffled ? .88 : 1.10), start+.003);
      g.gain.exponentialRampToValueAtTime(.0001, start+dur+.012);
      src.connect(hp); hp.connect(bp); bp.connect(lp); lp.connect(g); g.connect(audio.master);
      src.start(start); src.stop(start+dur+.018);
    }

    function layeredBurst(intensity=.65, speedNorm=.5, stressJump=.04) {
      if (!audio) return;
      const ac = audio.ac;
      const prof = soundProfile();
      const now = ac.currentTime;
      const minGap = currentMaterial === 'ice' ? .018 : currentMaterial === 'jelly' ? .040 : .026;
      if (now - (audio.lastLayered || 0) < minGap) return;
      audio.lastLayered = now;

      // 现在的多层不是“尾巴里一堆小水声”，而是随机多补一两声同等音量的炸点。
      const power = clamp(.72 + speedNorm*.52 + stressJump*2.8 + intensity*.46, .58, 1.75);
      const muffleChance = currentMaterial === 'jelly' ? .58 : currentMaterial === 'rice' ? .42 : .24;
      const eventCount = currentMaterial === 'ice'
        ? Math.floor(rand(3, 6))
        : currentMaterial === 'rice'
          ? Math.floor(rand(2, 5))
          : Math.floor(rand(2, 4));

      for (let i=0; i<eventCount; i++) {
        const d = i === 0 ? 0 : rand(.010, .070) + i * rand(.004, .014);
        const muffled = Math.random() < muffleChance;
        const crisp = soundVal('crisp', .72);
        const userMuffle = soundVal('muffle', .42);
        const bright = muffled ? rand(.76, 1.02) * (1.05 - userMuffle*.22) : rand(1.08, 1.62) * (.78 + crisp*.55);
        const pan = clamp((input.dx || 0) * .010 + rand(-.24,.24), -1, 1);
        const sameLevel = power * soundVal('burst', 1.0) * rand(.82, 1.10);

        // 同等音量的“劈里啪啦”：tick + knock / snap 组合，但不做长尾衰减。
        microBurstTick(sameLevel * (muffled ? .72 : .95), d, bright, pan);
        if (Math.random() < (currentMaterial === 'ice' ? .76 : currentMaterial === 'rice' ? .48 : .25)) {
          setTimeout(() => blockSnap(sameLevel * (currentMaterial === 'ice' ? .72 : .48)), d * 1000 + rand(0, 12));
        } else {
          muffledClayKnock(sameLevel * rand(.74, 1.02), d + rand(.004, .020), muffled);
        }
      }

      // 每种球的细微性格：冰更亮，米粒更咯吱，果冻更软包裹。
      if (currentMaterial === 'ice' && Math.random() < .62) {
        microBurstTick(power * rand(.72, 1.05), rand(.030, .092), rand(1.22, 1.72), rand(-.45,.45));
      } else if (currentMaterial === 'rice' && Math.random() < .46) {
        muffledClayKnock(power * rand(.72, 1.02), rand(.026, .086), Math.random() < .58);
      } else if (currentMaterial === 'jelly' && Math.random() < .35) {
        microBurstTick(power * rand(.45, .70), rand(.020, .075), rand(.62, .90), rand(-.35,.35));
      }

      if (speedNorm > .34 && Math.random() < .18 * soundVal('friction', .46)) {
        blockFriction(power * .26, clamp(speedNorm*.66, .16, .78));
      }
    }

    // ── Gesture Hints ──
    let lastHint = '';
    let hintTimeout = null;
    function showHint(text) {
      // 文案提示先关闭：声音和手感自己说话。
      return;
    }

    // ── Visual Pulse ──
    function visualPulse(x, y, size=40) {
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      ring.style.left = (x-size/2)+'px';
      ring.style.top = (y-size/2)+'px';
      ring.style.width = ring.style.height = size+'px';
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 500);
    }

    // ── Main Audio Update ──
    function updateAudio() {
      if (!audio || !audioUnlocked) return;
      const ac = audio.ac;
      if (ac.state === 'suspended') return;

      const s = clamp(currentStress, 0, 1);
      const moving = input.down && input.speed > .25;
      const touching = input.down;
      const speedNorm = clamp(input.speed / 30, 0, 1);
      const pressDuration = input.down ? (performance.now() - input.pressStartTime)/1000 : 0;

      // Ambient clay hum — always barely there, rises slightly when touching
      const prof = soundProfile();
      // 去掉类似“背景流水”的连续细噪，只保留手指触发的摩擦/爆破。
      const ambTarget = 0;
      audio.ambGain.gain.cancelScheduledValues(ac.currentTime);
      audio.ambGain.gain.setTargetAtTime(0, ac.currentTime, .025);
      audio.ambFilter.frequency.setTargetAtTime(220+s*80, ac.currentTime, .10);

      // Body resonance tuning — shifts with material
      audio.bodyRes.frequency.setTargetAtTime(prof.bodyFreq, ac.currentTime, .06);
      audio.bodyRes.gain.setTargetAtTime(prof.bodyPeak, ac.currentTime, .08);
      audio.bodyGain.gain.setTargetAtTime(prof.bodyGain, ac.currentTime, .08);

      // ── Dynamic Intensity & Rate from press duration + pressure ──
      // Longer press → heavier, louder per-tap, but slower rate (deliberate)
      // Higher pressure → louder
      // Fast movement → faster rate
      const pressureNorm = clamp(((input.pressure || 1) - 0.35) / 1.45, 0, 1);
      const durationSec = clamp(pressDuration, 0, 8);
      const durationFactor = clamp(durationSec / 3.5, 0, 1); // reaches 1.0 after 3.5s

      // Intensity = pressure (50%) + stress (30%) + duration (20%)
      const shapeWork = val('stretch')*.18 + val('plasticity')*.16;
      const intensity = pressureNorm * .46 + s * .30 + durationFactor * .18 + speedNorm * shapeWork;

      // Rate: fast movement → high rate; long press → rate slows (heavier taps, more spaced)
      const rateFromSpeed = speedNorm;
      const pressSlowdown = 1 - durationFactor * .65; // long press: rate drops to 35%
      const dynamicRate = clamp(rateFromSpeed * pressSlowdown + durationFactor * .08, .04, 1);

      // Cooldowns scale with rate
      const frictionCD = 8 + (1 - dynamicRate) * 58; // fast: ~18ms, slow: ~148ms
      const tapCD     = 14 + (1 - dynamicRate) * 70; // fast: ~20ms, slow: ~120ms
      const squishCD  = 260 + durationFactor * 420;    // deep press: slow sub-bass heartbeat ~500-1100ms
      const isDeepPress = pressDuration > .5 && speedNorm < .08;

      // ── Event Triggers ──
      const stressJump = Math.max(0, s - lastStressForEvent);

      if (touching) {
        wasTouching = true;
        const now = performance.now();

        // Gesture hints
        if (speedNorm > .55) {
          showHint('刷刷刷 ~ 积木粒在泥里摩擦');
        } else if (speedNorm > .15 && moving) {
          showHint('沙沙... 黏土和积木粒搅在一起');
        } else if (pressDuration > .4 && speedNorm < .1) {
          const deepLabel = durationFactor > .6 ? '重重地压进深处...' : '嗯... 压进黏土深处';
          showHint(deepLabel);
        }

        // Quick friction — rate driven by movement, intensity by pressure+duration
        // (suppressed during deep press to avoid muddling the sub-bass)
        if (!isDeepPress && speedNorm > .08 && (now - (soundCooldowns.friction||0) > frictionCD)) {
          blockFriction(intensity * (1.20 + val('stretch')*.35), clamp(dynamicRate + s*.22 + val('stretch')*.10, .12, 1));
          // Extra snap crackles for high speed
          if (speedNorm > .65 && Math.random() < prof.snapChance) {
            layeredBurst(intensity * .92, speedNorm, stressJump);
          }
          soundCooldowns.friction = now;
        }

        // Individual taps — cadence varies with press
        // (suppressed during deep press)
        if (!isDeepPress && speedNorm > .035 && speedNorm < .62 && (now - (soundCooldowns.tap||0) > tapCD)) {
          if (s > .12 && Math.random() < .62 + durationFactor*.18) layeredBurst(intensity*.98, speedNorm, stressJump);
          else blockTap(intensity*1.08, (input.dx||0)*.01);
          soundCooldowns.tap = now;
        }

        // Deep press squish — heavier & slower as press continues
        if (pressDuration > .22 && s > .08 && (now - (soundCooldowns.squish||0) > squishCD)) {
          claySquish(intensity * (1.0 + durationFactor*.45 + s*.35 + val('stretch')*.28));
          soundCooldowns.squish = now;
        }

        // Stress jump bursts (skip during deep press)
        if (!isDeepPress && stressJump > .028 && (now - (soundCooldowns.stress||0) > 32)) {
          layeredBurst(intensity * (stressJump > .08 ? 1.18 : .96), speedNorm, stressJump);
          if (stressJump > .08 && Math.random() < .72) blockFriction(intensity*.78, clamp(dynamicRate*.75 + .18, .18, .86));
          soundCooldowns.stress = now;
        }

        // Grain texture ticks — rate scales with intensity (skip during deep press)
        if (!isDeepPress && Math.random() < intensity * val('grain') * (.46 + prof.snapChance*.42)) {
          blockTap(intensity*.34, rand(-.5,.5));
        }
        if (!isDeepPress && currentMaterial === 'ice' && speedNorm > .38 && Math.random() < .28) {
          layeredBurst(intensity*.88, speedNorm, stressJump);
        }
        if (!isDeepPress && currentMaterial === 'rice' && speedNorm > .30 && Math.random() < .16) {
          layeredBurst(intensity*.72, speedNorm, stressJump);
        }
      } else {
        // Finger released — no pop, just let sounds fade naturally
        if (wasTouching && s > .2) {
          showHint('松开了~');
        }
        wasTouching = false;
      }

      lastStressForEvent = s * .92;
    }

    // ═══════════════════════════════════════
    //  POINTER EVENTS
    // ═══════════════════════════════════════
    function onPointerDown(e) {
      unlockAudio();
      input.down = true;
      input.pointerId = e.pointerId;
      input.x = input.px = e.clientX;
      input.y = input.py = e.clientY;
      input.dx = input.dy = input.speed = 0;
      input.pressure = e.pressure || 1;
      input.pressStartTime = performance.now();
      canvas.setPointerCapture(e.pointerId);
    }
    function onPointerMove(e) {
      if (!input.down || input.pointerId !== e.pointerId) return;
      input.px = input.x; input.py = input.y;
      input.x = e.clientX; input.y = e.clientY;
      input.dx = input.x-input.px; input.dy = input.y-input.py;
      input.speed = Math.hypot(input.dx,input.dy);
      input.pressure = e.pressure || 1;
    }
    function onPointerUp(e) {
      if (input.pointerId !== e.pointerId) return;
      input.down = false;
      input.pointerId = null;
      input.dx = input.dy = input.speed = 0;
    }
    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerup', onPointerUp);
    canvas.addEventListener('pointercancel', onPointerUp);

    // ═══════════════════════════════════════
    //  PHYSICS
    // ═══════════════════════════════════════
    function applyFinger() {
      let stressSum = 0;
      const stretch = val('stretch');
      const radius = Math.min(W,H)*(.155 + stretch*.045);
      const softness = val('softness'), stickiness = val('stickiness');
      const plasticity = val('plasticity');
      const resistance = .98-softness*.48;
      const pressure = clamp(input.pressure||1, .35, 1.8);

      for (const n of nodes) {
        n.stress *= .86; n.slip *= .78; n.depth = (n.depth || 0) * (.988 + val('dentMemory')*.008);
        if (!input.down) continue;
        const dx=n.x-input.x, dy=n.y-input.y;
        const d=Math.hypot(dx,dy);
        if (d<radius) {
          const t=1-smoothstep(0,radius,d);
          const core=Math.pow(t,resistance);
          const edgeDamp=.74+n.edgeFactor*.48;

          // Grab a local patch, but do not let the whole blob become a thin sheet.
          const dragPower=(.22+stickiness*.34+softness*.20+stretch*.28)*core*pressure*edgeDamp;
          n.x+=input.dx*dragPower; n.y+=input.dy*dragPower;

          const awayX=d>.001?dx/d:Math.cos(Math.random()*Math.PI*2);
          const awayY=d>.001?dy/d:Math.sin(Math.random()*Math.PI*2);

          // Thumb dent.
          const dent=(4.9+input.speed*.034)*core*(1-softness*.10)*pressure*(.82+val('dentMemory')*.46);
          n.x+=awayX*dent; n.y+=awayY*dent;

          // Side shear, but kept dense and dough-like.
          const tangentX=-awayY, tangentY=awayX;
          const shear=(input.dx*tangentX+input.dy*tangentY)*core*(.020+stickiness*.026+stretch*.010);
          n.x+=tangentX*shear; n.y+=tangentY*shear;

          // Small smear along the finger path: enough to feel gummy, not enough to tear into film.
          const smear = clamp(input.speed/30, 0, 1) * core * (.022 + plasticity*.024 + stretch*.018) * pressure;
          n.x += input.dx * smear;
          n.y += input.dy * smear;

          // Raised rim around the dent. This is the important "thick hand-made ball" cue.
          if (d > radius*.20 && d < radius*.64) {
            const ring = 1 - Math.abs(d - radius*.42)/(radius*.22);
            const bulge = Math.max(0, ring) * (1.05 + softness*.45) * pressure;
            n.x -= awayX * bulge * .55;
            n.y -= awayY * bulge * .55;
          }

          const localStress=core*(.22+input.speed*.034+pressure*.15);
          n.stress=Math.max(n.stress,localStress);
          n.depth=Math.max(n.depth || 0, core * pressure * (.42 + plasticity*.32 + val('dentMemory')*.46));
          n.slip+=localStress*(val('grain')+.22);
          stressSum+=localStress;
          if (localStress>.07) {
            const y=(plasticity*.052 + stretch*.020 + val('dentMemory')*.020)*(localStress+.42);
            n.rx+=(n.x-n.rx)*y; n.ry+=(n.y-n.ry)*y;
          }
        }
      }
      currentStress=clamp(currentStress*.82+stressSum/Math.max(1,nodes.length)*5.6,0,1);
    }

    function solveEdges() {
      const soft = val('softness'), plast = val('plasticity');
      const stiffness=.13+(1-soft)*.27;
      const maxStretch = 1.34 + plast*.070 + soft*.045;
      const minCompress = .66 - soft*.06;
      for (const e of edges) {
        const A=nodes[e.a], B=nodes[e.b];
        const dx=B.x-A.x, dy=B.y-A.y;
        const dist=Math.hypot(dx,dy)||.0001;
        const target = e.rest;
        const diff=(dist-target)/dist;
        let edgeStiff = stiffness;
        if (dist > target * maxStretch) edgeStiff *= 2.15;
        if (dist < target * minCompress) edgeStiff *= 1.35;
        const corr=diff*edgeStiff*e.strength;
        const cx=dx*corr*.5, cy=dy*corr*.5;
        A.x+=cx;A.y+=cy; B.x-=cx;B.y-=cy;
        const st=Math.abs(diff)*e.strength;
        A.stress=Math.max(A.stress,st); B.stress=Math.max(B.stress,st);

        // Very limited yielding: it can remember a dent, but cannot melt into a sheet.
        const yieldAmt = (plast*.0065 + val('stretch')*.0045) * clamp(st*2.4, 0, 1);
        e.rest += (dist - e.rest) * yieldAmt;
        e.rest += ((e.baseRest || e.rest) - e.rest) * (.00024 + val('elasticity')*.0022);
      }
    }

    function keepArea() {
      const pts=boundarySorted();
      const area=polygonArea(pts);
      const ratio=(targetArea-area)/targetArea;
      const stretch = val('stretch');
      const plasticity = val('plasticity');
      // Keep thickness/volume. It may become oval or dented, but not a flat puddle.
      const strength=clamp(ratio,-.045,.12)*(.20+val('elasticity')*.18+plasticity*.055)*(1-stretch*.32);
      const cx=average(boundary,'x'), cy=average(boundary,'y');
      for (const n of boundary) { n.x+=(n.x-cx)*strength; n.y+=(n.y-cy)*strength; }
    }

    function relaxToMemory() {
      const elasticity=val('elasticity'), plasticity=val('plasticity');
      const stretch=val('stretch');
      const pull=(.00032+elasticity*.0048)*(1-stretch*.38);
      const drift=(.00022+plasticity*.00072)*(1-stretch*.30);
      for (const n of nodes) {
        n.x+=(n.rx-n.x)*pull; n.y+=(n.ry-n.y)*pull;
        n.rx+=(n.homeX-n.rx)*drift*(1-plasticity*.62);
        n.ry+=(n.homeY-n.ry)*drift*(1-plasticity*.62);
      }
    }

    function pointInPolygon(x,y,pts) {
      let inside = false;
      for (let i=0,j=pts.length-1;i<pts.length;j=i++) {
        const xi=pts[i].x, yi=pts[i].y, xj=pts[j].x, yj=pts[j].y;
        const intersect = ((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi+1e-6)+xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function keepCohesion() {
      const cx = average(nodes,'x'), cy = average(nodes,'y');
      const soft = val('softness'), plast = val('plasticity'), elast = val('elasticity');
      const maxStretch = 1.32 + plast*.09 + soft*.05;
      const minStretch = .50 + elast*.05;
      for (const n of nodes) {
        const dx=n.x-cx, dy=n.y-cy;
        const dist=Math.hypot(dx,dy)||.0001;
        const rr = n.restRadius || dist;
        const maxR = rr * maxStretch;
        const minR = Math.max(8, rr * minStretch * (n.edgeFactor>.75 ? .90 : 1));
        if (dist > maxR) {
          const over = (dist-maxR)/dist;
          n.x -= dx * over * (.11 + (1-n.edgeFactor)*.035);
          n.y -= dy * over * (.11 + (1-n.edgeFactor)*.035);
        }
        if (dist < minR && n.edgeFactor > .12) {
          const under = (minR-dist)/minR;
          n.x += dx/dist * under * .07;
          n.y += dy/dist * under * .07;
        }
        if (n.edgeFactor < .42) {
          n.x += (cx-n.x) * (.0012 + plast*.00055);
          n.y += (cy-n.y) * (.0012 + plast*.00055);
        }
      }
    }

    function smoothBoundaryShape() {
      const cx = average(boundary,'x'), cy = average(boundary,'y');
      const ring=[...boundary].sort((a,b)=>Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx));
      const snap=.09;
      for (let i=0;i<ring.length;i++) {
        const prev=ring[(i-1+ring.length)%ring.length];
        const next=ring[(i+1)%ring.length];
        const n=ring[i];
        const sx=(prev.x+next.x)*.5;
        const sy=(prev.y+next.y)*.5;
        n.x = n.x*(1-snap) + sx*snap;
        n.y = n.y*(1-snap) + sy*snap;

        const dx=n.x-cx, dy=n.y-cy;
        const dist=Math.hypot(dx,dy)||.0001;
        const rr = n.restRadius || dist;
        const maxR=rr*(1.26 + val('plasticity')*.075 + val('softness')*.04);
        if (dist > maxR) {
          n.x = cx + dx/dist*maxR;
          n.y = cy + dy/dist*maxR;
        }
      }
    }

    function updateToppings() {
      const grain=val('grain');
      const pts = boundarySorted();
      const cx = average(nodes,'x'), cy = average(nodes,'y');
      for (const t of toppings) {
        const tx=t.anchor.x+t.ox, ty=t.anchor.y+t.oy;
        const jitter=t.anchor.slip*grain*.38;
        t.x+=(tx-t.x)*Math.max(.20, t.lag*1.18)+rand(-jitter,jitter);
        t.y+=(ty-t.y)*Math.max(.20, t.lag*1.18)+rand(-jitter,jitter);
        t.rot+=t.spin+t.anchor.stress*.026;
        if (!pointInPolygon(t.x, t.y, pts)) {
          // The target itself may be just outside when an edge anchor deforms.
          // Shrink the local offset once, then ease back into the gel instead of bouncing forever.
          t.ox *= .72;
          t.oy *= .72;
          const ntx = t.anchor.x + t.ox;
          const nty = t.anchor.y + t.oy;
          t.x = t.x*.62 + ntx*.24 + cx*.14;
          t.y = t.y*.62 + nty*.24 + cy*.14;
        }
      }
    }

    function updatePhysics() {
      applyFinger();
      for (let i=0;i<3;i++) { solveEdges(); keepArea(); keepCohesion(); smoothBoundaryShape(); }
      relaxToMemory();
      updateToppings();
      updateAudio();
      stressMeter.style.width=Math.round(currentStress*100)+'%';
      popFlash*=.86;
    }

    // ═══════════════════════════════════════
    //  RENDERING
    // ═══════════════════════════════════════
    function hexToRgb(hex) {
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      return {r,g,b};
    }

    function drawBackground() {
      ctx.clearRect(0,0,W,H);
      ctx.save();
      ctx.globalAlpha=.25;
      ctx.fillStyle='#fff';
      for (let i=0;i<16;i++) {
        ctx.beginPath();
        ctx.arc((i*163)%W,(i*97)%H,3+(i%5),0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    function drawBlob() {
      const pts=boundarySorted();
      if(pts.length<4) return;
      const cx=average(nodes,'x'), cy=average(nodes,'y');
      const stressGlow=currentStress*18+popFlash*26;
      const baseRgb = hexToRgb(window.getBaseColor ? window.getBaseColor() : '#ffe284');

      ctx.save();
      ctx.shadowColor=`rgba(${baseRgb.r},${baseRgb.g},${baseRgb.b},${.14+currentStress*.14})`;
      ctx.shadowBlur=20+stressGlow*.62;
      ctx.shadowOffsetY=12;

      const grad=ctx.createRadialGradient(cx-36,cy-54,16,cx,cy,Math.min(W,H)*.30);
      const bc = window.getBaseColor ? window.getBaseColor() : '#ffe284';
      grad.addColorStop(0, 'rgba(255,250,218,.46)');
      grad.addColorStop(.34, bc+'99');
      grad.addColorStop(.62, bc);
      grad.addColorStop(1, bc+'ef');

      ctx.beginPath();
      const last=pts[pts.length-1], first=pts[0];
      ctx.moveTo((last.x+first.x)/2,(last.y+first.y)/2);
      for (let i=0;i<pts.length;i++) {
        const p=pts[i], q=pts[(i+1)%pts.length];
        ctx.quadraticCurveTo(p.x,p.y,(p.x+q.x)/2,(p.y+q.y)/2);
      }
      ctx.closePath();
      ctx.fillStyle=grad;
      ctx.fill();

      // Subsurface thickness: a cloudy core and a soft rim make it read as a thick hand-made ball.
      ctx.save();
      ctx.clip();
      const cloud = ctx.createRadialGradient(cx-10, cy-8, 8, cx, cy, Math.min(W,H)*.25);
      cloud.addColorStop(0, 'rgba(255,255,255,.07)');
      cloud.addColorStop(.55, 'rgba(255,255,255,.035)');
      cloud.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = cloud;
      ctx.fillRect(cx-Math.min(W,H)*.34, cy-Math.min(W,H)*.34, Math.min(W,H)*.68, Math.min(W,H)*.68);
      ctx.restore();

      ctx.globalAlpha=currentMaterial==='jelly'?.36:.16;
      ctx.lineWidth=1.2;
      ctx.strokeStyle='rgba(255,255,255,.82)';
      ctx.stroke();
      ctx.restore();

      // Stress dimples — smaller and more localized, less muddy over time.
      ctx.save();
      ctx.globalCompositeOperation='multiply';
      for (const n of nodes) {
        const dentDepth = Math.max(n.stress*.55, n.depth || 0);
        if(dentDepth<.065) continue;
        ctx.globalAlpha=clamp(dentDepth*.30,0,.22);
        ctx.fillStyle='rgba(140,74,36,.18)';
        ctx.beginPath();
        ctx.ellipse(n.x,n.y,6+dentDepth*13,3.5+dentDepth*7,dentDepth*5,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();

      // Highlight
      ctx.save();
      ctx.globalAlpha=currentMaterial==='jelly'?.42:.24;
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.ellipse(cx-46,cy-58,28,11,-.55,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=currentMaterial==='jelly'?.08:.045;
      ctx.beginPath();
      ctx.ellipse(cx+14,cy+18,54,36,.18,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function drawToppings() {
      const accentColor = window.getAccentColor ? window.getAccentColor() : '#ff903e';
      ctx.save();
      for (const t of toppings) {
        ctx.save();
        ctx.translate(t.x,t.y);
        ctx.rotate(t.rot);
        const inside = t.depthLayer < .62;
        const localAlpha = inside ? (.18 + t.alpha*.32) : (.55 + t.alpha*.34);
        ctx.globalAlpha=localAlpha;

        if (toppingStyle==='shard') {
          ctx.fillStyle=inside ? accentColor+'66' : accentColor+'cc';
          ctx.fillRect(-t.r*t.scale,-t.r*.55*t.scale,t.r*2*t.scale,t.r*1.1*t.scale);
        } else if (toppingStyle==='star') {
          ctx.fillStyle=inside ? accentColor+'66' : accentColor;
          star(0,0,t.r*1.25*t.scale,t.r*.52*t.scale,5);
        } else if (toppingStyle==='dot') {
          ctx.fillStyle=t.kind<.6?(inside ? accentColor+'66' : accentColor):(inside ? 'rgba(255,255,255,.36)' : '#ffffffdd');
          ctx.beginPath();
          ctx.arc(0,0,t.r*.70*t.scale,0,Math.PI*2); ctx.fill();
        } else if (toppingStyle==='mix') {
          if (typeof t.kind==='string') {
            if (t.kind==='shard') {
              ctx.fillStyle=inside ? accentColor+'66' : accentColor+'cc';
              ctx.fillRect(-t.r*t.scale,-t.r*.55*t.scale,t.r*2*t.scale,t.r*1.1*t.scale);
            } else if (t.kind==='star') {
              ctx.fillStyle=inside ? accentColor+'66' : accentColor;
              star(0,0,t.r*1.25*t.scale,t.r*.52*t.scale,5);
            } else if (t.kind==='dot') {
              ctx.fillStyle=inside ? 'rgba(255,255,255,.32)' : '#ffffffdd';
              ctx.beginPath(); ctx.arc(0,0,t.r*.65*t.scale,0,Math.PI*2); ctx.fill();
            } else {
              ctx.fillStyle=inside ? accentColor+'66' : accentColor;
              ctx.beginPath();
              ctx.ellipse(0,0,t.r*1.25*t.scale,t.r*.78*t.scale,0,0,Math.PI*2); ctx.fill();
            }
          } else {
            ctx.fillStyle=inside ? accentColor+'66' : accentColor;
            ctx.beginPath();
            ctx.ellipse(0,0,t.r*1.25*t.scale,t.r*.78*t.scale,0,0,Math.PI*2); ctx.fill();
          }
        } else {
          // rice (default): oval grains
          ctx.fillStyle=t.kind<.55?(inside ? 'rgba(255,255,245,.38)' : 'rgba(255,255,245,.94)'):(inside ? accentColor+'66' : accentColor);
          ctx.beginPath();
          ctx.ellipse(0,0,t.r*1.25*t.scale,t.r*.78*t.scale,0,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      ctx.restore();
    }

    function star(x,y,outer,inner,points) {
      ctx.beginPath();
      for (let i=0;i<points*2;i++) {
        const r=i%2===0?outer:inner;
        const a=-Math.PI/2+i*Math.PI/points;
        const px=x+Math.cos(a)*r, py=y+Math.sin(a)*r;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill();
    }

    function drawFingerBrush() {
      if(!input.down) return;
      ctx.save();
      const radius=Math.min(W,H)*.165;
      const g=ctx.createRadialGradient(input.x,input.y,0,input.x,input.y,radius);
      g.addColorStop(0,'rgba(255,255,255,.28)');
      g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(input.x,input.y,radius,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function frame() {
      updatePhysics();
      drawBackground();
      drawBlob();
      drawToppings();
      drawFingerBrush();
      requestAnimationFrame(frame);
    }

    resize();
    applyPreset('rice');
    requestAnimationFrame(frame);
  </script>
</body>
</html>
